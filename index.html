<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
    <title>To-do list</title>
</head>
<body>
    <main class="main">
        <div class="container">
            <form class="form">
                <input data-text-input class="input" type="text" placeholder="Введите текст">
                <input data-create-btn class="button" type="button" value="Добавить">
            </form>
            <div class="result-block">
                <ul data-text-result class="lists"></ul>
            </div>
        </div>
    </main>
</body>
</html>
